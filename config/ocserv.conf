# ocserv config for the TOTP test lab.
# Every non-trivial option is commented so it's clear what it does.
# Reference: man ocserv.conf

# ---- debug logging (temporary, for diagnosing PAM auth failures) ---------
# log-level = 4 → very verbose (DEBUG). Production should be 0 or 1.
log-level = 4

# ---- ban-system OFF for lab -----------------------------------------------
# Docker Desktop's vpnkit sends TCP health probes to mapped ports — ocserv
# sees them as malformed TLS packets and increments ban score, eventually
# blocking the host. Disable scoring entirely for the lab.
max-ban-score = 0
ban-reset-time = 1

# ---- authentication ------------------------------------------------------
# Use PAM for auth. `gid-min=1000` means ocserv will only accept users whose
# primary GID is >= 1000 — i.e. regular Linux users, not system/service ones.
# The actual PAM chain is in /etc/pam.d/ocserv (password + TOTP).
auth = "pam[gid-min=1000]"

# ---- listening sockets ---------------------------------------------------
# Inside the container ocserv listens on 443/tcp and 443/udp. The host maps
# 4443 -> 443 (see docker-compose.yml) so clients hit `localhost:4443`.
tcp-port = 443
udp-port = 443

# ---- TLS / cert ----------------------------------------------------------
# Generated by entrypoint.sh on first start. Self-signed → clients must use
# `-k` (or pin via --servercert) when connecting. Documented in README.
server-cert = /etc/ocserv/ssl/server-cert.pem
server-key  = /etc/ocserv/ssl/server-key.pem

# ---- process model -------------------------------------------------------
# For a lab we keep things simple: workers stay un-isolated so PAM can read
# /etc/shadow without ceremony. DO NOT do this in production — there you
# want `isolate-workers = true` and `run-as-user = nobody`.
isolate-workers = false

# Where ocserv puts its control socket. occtl uses it to talk to the server.
socket-file = /var/run/ocserv-socket
use-occtl   = true
pid-file    = /var/run/ocserv.pid

# Friendly name shown in some clients.
default-domain = vpn.local

# ---- client limits -------------------------------------------------------
max-clients      = 16
max-same-clients = 2

# ---- timeouts & keepalive -----------------------------------------------
keepalive       = 32400   # send a keepalive every ~9h (long because TLS layer also keeps state)
dpd             = 90      # Dead Peer Detection — check every 90s
mobile-dpd      = 1800    # gentler DPD for mobile clients (30 min)
auth-timeout    = 240     # how long the user has to enter password + TOTP
min-reauth-time = 300     # after a failed auth, throttle re-attempts (anti brute-force)
cookie-timeout  = 300

# MTU discovery — helps avoid mysterious "connects but no traffic" issues.
try-mtu-discovery = true

# ---- network handed to clients ------------------------------------------
# Clients get an IP from this /24. Inside the container this is the tun side.
ipv4-network = 192.168.99.0
ipv4-netmask = 255.255.255.0

# ---- split tunnel (CRITICAL on macOS + Docker Desktop) ------------------
# Without this ocserv pushes a default route (0.0.0.0/0) to the client, which
# tries to send ALL traffic through the tunnel. On macOS the tunnel exits to
# a docker container, which has no upstream — result: host loses internet.
# With this line the client only routes 192.168.99.0/24 (the VPN subnet
# itself) through the tunnel. Everything else stays on the host's normal
# network. This is what makes the lab safe to run.
route = 192.168.99.0/255.255.255.0

# DNS pushed to clients — only useful when full-tunnel mode is on, harmless
# in split-tunnel. Commented out to avoid macOS networksetup errors during
# vpnc-script post-up step.
#dns = 1.1.1.1

# Name of the tun device ocserv creates inside the container.
device = vpns

# Give the same user the same IP across reconnects — easier to reason about.
predictable-ips = true

# Better compatibility with AnyConnect-protocol clients (which openconnect speaks).
cisco-client-compat = true

# Re-key every 48h. Standard hygiene.
rekey-time   = 172800
rekey-method = ssl

# Allow connections from any source IP (we're behind Docker NAT anyway).
deny-roaming = false

# Don't ping clients to verify their lease — just rely on DPD.
ping-leases = false
