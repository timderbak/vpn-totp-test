{% extends "base.html" %}
{% block body %}
<header>
  <strong>ocserv admin</strong> &mdash; {{ admin.username }}
  <nav>
    <a href="/">Users</a> &middot; <a href="/tokens">API Tokens</a> &middot; <a href="/audit">Audit</a>
    &middot; <form method="post" action="/logout" style="display:inline">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        <button type="submit">Logout</button>
      </form>
  </nav>
</header>

<p>
  <form method="post" action="/users/_refresh" style="display:inline">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    <button type="submit">&#x1F504; Refresh</button>
  </form>
  {% if cache_age is not none %}
  <small>список обновлён {{ cache_age }} сек назад &middot; из LDAP</small>
  {% endif %}
</p>

<table>
  <thead><tr><th>User</th><th>TOTP</th><th>Status</th><th>Last issued</th><th>Actions</th></tr></thead>
  <tbody hx-get="/users/_list" hx-trigger="load" hx-swap="innerHTML">
    <tr><td colspan="5">&#x23F3; Загружаем юзеров из LDAP...</td></tr>
  </tbody>
</table>
{% endblock %}
